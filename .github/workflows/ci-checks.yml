name: CI (Type Check, Lint, Format, Audit, Build)

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --pretty

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.sha }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "${base_sha}" ]]; then
            echo "No base SHA available; skipping Prettier check."
            exit 0
          fi

          # Only check files that are likely to need formatting.
          # (We intentionally exclude YAML/Kubernetes/Workflow files to avoid noisy failures.)
          mapfile -t files < <(git diff --name-only "${base_sha}" "${head_sha}" \
            | grep -E '\\.(ts|tsx|js|jsx|json|css|md|html)$' || true)

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No relevant files changed; skipping Prettier check."
            exit 0
          fi

          echo "Running Prettier on changed files: ${#files[@]}"
          npx prettier@3.6.2 --check "${files[@]}"

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
